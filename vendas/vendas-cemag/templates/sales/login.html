{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Portal CEMAG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="container" style="max-width: 420px;">
        <div class="card p-4 shadow-sm">
            <div class="text-center mb-3">
                <h4 class="mb-1">Portal de Vendas CEMAG</h4>
                <p class="muted mb-0">Informe suas credenciais</p>
            </div>
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
            <form id="loginForm" method="post" novalidate>
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Login</label>
                    <input type="text" name="login" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="loginSubmit">
                    <span class="spinner-border spinner-border-sm me-2 d-none" role="status" aria-hidden="true" id="loginSpinner"></span>
                    <span id="loginSubmitText">Entrar</span>
                </button>
            </form>
            <div class="text-center mt-3">
                <small class="muted">Credenciais gerenciadas via admin.</small>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function () {
            const form = document.getElementById("loginForm");
            const submitBtn = document.getElementById("loginSubmit");
            const spinner = document.getElementById("loginSpinner");
            const submitText = document.getElementById("loginSubmitText");

            if (!form || !submitBtn || !spinner || !submitText) {
                return;
            }

            form.addEventListener("submit", function () {
                submitBtn.disabled = true;
                spinner.classList.remove("d-none");
                submitText.textContent = "Entrando...";
            });
        })();
    </script>
</body>
</html>
